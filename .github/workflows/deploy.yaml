name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: contains(github.event.head_commit.message, 'deploy')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Extract PORT and build app name
        id: read_env
        run: |
          PORT=$(grep -E '^PORT=' .env | cut -d '=' -f2 | tr -d '[:space:]')
          REPO_NAME="${{ github.event.repository.name }}"
          echo "APP_NAME=${REPO_NAME}_${PORT}" >> $GITHUB_OUTPUT
          echo "Deploying as: ${REPO_NAME}_${PORT}"

      - name: Copy build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: ".next/, public/, package.json, package-lock.json, next.config.*, .env"
          target: "$HOME/${{ github.event.repository.name }}"

      - name: Install production deps & restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            source ~/.bashrc || true
            source ~/.profile || true
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd $HOME/${{ github.event.repository.name }}
            npm ci --omit=dev
            pm2 restart ${{ steps.read_env.outputs.APP_NAME }} \
              || pm2 start npm --name "${{ steps.read_env.outputs.APP_NAME }}" -- start
            pm2 save